cases:
- id: case_expert_016_1
  year: 2023
  title: "某头部跨境电商——东南亚六国市场进入策略"
  problem: "一家年GMV超千亿的跨境电商平台在经历国内市场高速增长后决定出海东南亚。核心困境：东南亚六国（印尼/泰国/越南/马来西亚/菲律宾/新加坡）市场差异巨大没有统一的'东南亚市场'——每个国家的语言、文化、支付习惯、物流基础设施各不相同。公司的初始策略是'将国内模式复制到东南亚'——大量铺货、补贴获客、自建物流。第一年烧掉30亿元但GMV远不及预期，团队陷入严重内部争论：是继续坚持原有策略还是彻底重构？"
  action: "运用出海风险三维评估模型对六国市场进行系统评估。政治维度发现印尼的电商外资政策存在重大不确定性——要求外资电商平台设立本地实体且逐步实现本地化内容；市场维度发现泰国和越南的本地支付习惯（现金+货到付款占比超70%）与中国市场的移动支付主导截然不同；运营维度发现东南亚物流最后一公里的成本是中国的3倍。根据三维评估结果，建议放弃'统一策略'改为'一国一策'：印尼市场选择与本地电商平台合资而非独资进入以规避政策风险，泰国/越南采用社交电商模式（利用Line/Facebook生态）而非独立APP模式，新加坡作为区域性总部和高端市场布局。同时建议初期采用轻资产模式——利用本地第三方物流而非自建——待验证市场匹配后再考虑重资产投入。"
  result: "策略调整后18个月，东南亚六国月GMV从不足3000万增长至8亿元。印尼合资项目避免了后续出台的外资电商限制政策的冲击。泰国和越南的社交电商模式获客成本仅为传统模式的1/5。出货风险三维评估模型在此过程中验证了其有效性——尤其是三维交叉影响矩阵的预测，让公司在政策变化前就完成了规避动作。此案例成为跨境电商出海的经典策略范本。"
  transferable: "新兴市场进入的核心策略不是'复制'而是'适配'。出海风险三维评估模型帮助企业在一开始就避免了'一刀切'的错误策略，适用于任何需要做跨国市场选择的评估场景。"

- id: case_expert_016_2
  year: 2024
  title: "某新能源车企——中东和拉美市场的进入风险评估"
  problem: "一家中国新能源车企在国内和欧洲市场取得成功后，计划进入中东和拉美市场。管理层面临的决策困境：中东市场石油资源丰富是否意味着电动车需求不足？沙特和阿联酋虽然富裕但市场规模有限。拉美市场（巴西/墨西哥）看似有潜力但政治经济环境不稳定。投入15亿美元同时进入两个市场的风险是否可控？"
  action: "启动中东和拉美5个重点国家的三维深度评估。政治维度发现：沙特'2030愿景'明确将新能源汽车列为战略产业，提供高额补贴但要求外资企业在本地组装生产的本地化率逐步提高到40%以上；巴西对进口电动车征收高额关税（35%）但本地化生产可享受税收优惠。市场维度发现：沙特虽然石油便宜但年轻人的环保意识提升和阿联酋的绿色转型政策使得高端电动车有明确的市场需求；巴西的乙醇燃料和丰田的混动技术形成了独特的竞争格局。运营维度评估发现：中东的极端高温对电池寿命的影响需要重新设计热管理系统（额外投入约2亿元），拉美的供应链距离中国太远导致备件响应周期长达8周。综合评估后建议分阶段进入：先在沙特/AUE建立品牌体验店（轻资产模式）测试市场反应，同步在巴西考察与本地车企合资组装的可能性。"
  result: "品牌体验店在迪拜开设后6个月即实现盈利，高端车型订单超预期。沙特市场利用2030愿景政策拿到了充电基础设施建设的政府订单。巴西合资谈判顺利进行，预计2026年实现本地化生产。对极端高温导致的热管理系统问题的预警帮助公司在产品设计阶段就规避了潜在的售后灾难。整体投入节省超5亿元。"
  transferable: "新兴市场进入不仅仅是销售产品的问题，更是从产品适配到供应链、从品牌定位到政策应对的全方位系统工程。三维评估模型帮助企业在投入巨额资金前先通过轻资产方式验证市场假设。"

- id: case_expert_016_3
  year: 2022
  title: "中国消费电子品牌——印度市场地缘风险预警与撤出策略"
  problem: "2022年初，某中国消费电子品牌在印度市场年营收超100亿元，占据印度智能手机市场前三。然而，中印边境紧张局势持续升级，印度政府开始对中国科技企业采取一系列限制措施——封禁数十款中国APP、收紧中国投资的审批、对在印中资企业发起税务调查。管理层面临艰难选择：是继续深耕印度市场（投入更多本地化资源来化解风险），还是主动调整印度市场的策略（降低比重/寻找退出路径）？两种选择都意味着数十亿元的战略摇摆。"
  action: "紧急启动印度市场地缘风险专项评估。运用出海风险三维评估模型快速更新印度市场的评分。政治维度评分从六个月前的2.5/5急剧恶化至4.5/5——核心变化是印度政府的政策从'有限限制'升级为'系统性的去中国化'，且未来12个月内看不到改善的迹象。在对华关系指标上，评分降至1/5（历史最低）。运用情景推演法设定三种情景：基准情景（维持现状1-2年，概率60%）、恶化情景（进一步限制措施，包括强制本地股权转让，概率30%）、改善情景（缓和，概率10%）。综合评估后建议：不立即完全撤出（会带来巨大的品牌和库存损失），但执行'战略收缩+风险对冲'策略（1）停止在印的进一步投资扩张；（2）将高端产品的生产逐步转移至越南和印度尼西亚以减少印度工厂对全球供应链的依赖；（3）开始探索印度市场的'本地化合作'模式——与本地渠道商成立合资公司，将品牌授权运营而降低政治风险敞口。"
  result: "建议被采纳为印度市场策略。2023年印度政府确实出台了更加严格的外资政策，但该品牌因为已经启动产能转移和本地化合作，受到的冲击远小于预期。后续两年该品牌在印度市场虽然营收下降，但保持了盈利（原先的竞争对手因应对不及陷入亏损）。产能向越南和印尼的转移也为东南亚市场的扩张奠定了基础。"
  transferable: "地缘政治风险不是'有或没有'的问题，而是'何时触发'的问题。对所有在敏感市场的企业来说，'退出预案不是悲观主义而是基本的风险管理'。情景推演法帮助企业在危机真正到来之前就完成了应对准备。"
