<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  background: #0d0d0d;
  padding: 60px;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
}
.card {
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 56px;
}
h1 {
  color: #ffffff;
  font-size: 42px;
  font-weight: 800;
  margin-bottom: 36px;
  letter-spacing: 0.5px;
}
h1 span { color: #4ade80; }
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}
.stat-item {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  padding: 24px;
}
.stat-number {
  font-size: 44px;
  font-weight: 800;
  color: #4ade80;
  margin-bottom: 6px;
}
.stat-label {
  font-size: 15px;
  color: #888;
}
.data-row {
  display: flex;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid #222;
  color: #ccc;
  font-size: 16px;
}
.data-row:last-child { border-bottom: none; }
.data-label { color: #888; }
.data-value { color: #fff; font-weight: 600; }
.tag-line {
  display: flex;
  gap: 10px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.tag {
  background: #1a1a1a;
  border: 1px solid #333;
  color: #aaa;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
}
.tag.highlight {
  border-color: #4ade80;
  color: #4ade80;
}
.footer {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid #222;
  font-size: 13px;
  color: #555;
  text-align: center;
}
</style>
</head>
<body>
<div class="card">
  <h1>{{TITLE}}</h1>
  <div class="stat-grid">
    {{STATS}}
  </div>
  <div class="data-rows">
    {{DATA_ROWS}}
  </div>
  <div class="tag-line">
    {{TAGS}}
  </div>
  <div class="footer">{{FOOTER}}</div>
</div>
</body>
</html>
