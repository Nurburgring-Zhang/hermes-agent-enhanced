cases:
- id: case_expert_123_1
  year: 2023
  title: "某大型银行信贷AI系统——算法歧视发现与公平性修复"
  problem: "某大型商业银行的AI信贷审批系统上线一年后，监管部门接到多起投诉，部分群体投诉其贷款审批通过率异常偏低。初步内部检测未发现明显的'种族/性别'直接歧视，但监管压力持续增大。银行聘请外部审计团队也未能给出明确的结论，因为模型包含数百个特征，传统的单一维度偏见检测方法无法捕捉到复杂的交互式偏见。"
  action: "运用AI伦理三原则评估矩阵对该信贷模型进行全面审计。在公平性维度，不仅检测了单一敏感属性（性别、年龄）的差异，还采用了交叉性分析方法（Intersectionality Analysis）——将多个属性交叉分组后发现：'30岁以下、非本地户籍、自由职业'三个属性组合的群体审批通过率仅为其他群体的23%，而该组合在模型中并无任何显式的敏感属性。问题根源在于：模型从'职业稳定性'特征中学习到了对自由职业者的歧视，而自由职业者群体中非本地户籍的年轻人比例畸高。在透明度维度，发现模型使用的LIME解释每次输出都不一致，说明模型的决策边界在某些子空间中极不稳定。提出了修复方案：（1）在训练数据中对弱势群体进行过采样，平衡代表性；（2）在模型训练中加入公平性约束（Demographic Parity）；（3）对高风险群体引入人工复核的'熔断机制'——当模型置信度低于阈值时自动转人工审批；（4）建立模型公平性的持续监控指标，每月自动报告。"
  result: "三个月后修复完成，弱势群体的审批通过率从23%提升至67%（仍在合理差异范围内但已消除系统性歧视）。模型输出的稳定性提升了40%。银行建立了常态化的AI伦理审计机制，每季度向董事会报告算法公平性指标。此案例被银保监会列为'AI金融应用伦理治理的典型案例'。"
  transferable: "算法歧视往往不是显式的种族/性别歧视，而是通过代理特征（如邮政编码、职业、消费习惯）形成的间接歧视。交叉性分析是发现此类复杂偏见的关键方法论。"

- id: case_expert_123_2
  year: 2022
  title: "跨国科技公司全球数据合规治理框架搭建"
  problem: "一家中国头部科技公司在全球化扩张中面临严重的数据合规挑战：产品覆盖30多个国家，涉及GDPR（欧盟）、CCPA（加州）、PIPL（中国）、LGPD（巴西）等多个法域的法规要求。公司原有的数据治理体系是为中国市场设计的，完全无法适应多法域要求。各业务线各自为政，缺乏统一的合规策略。（1）用户数据在全球范围内自由流转，没有任何法域边界控制；（2）数据处理的透明度极低，用户无法了解自己的数据被如何使用；（3）公司没有DPO（数据保护官）职位，也没有系统的DPIA（数据保护影响评估）流程。"
  action: "首先，运用compliance_framework_builder工具，将GDPR、CCPA、PIPL、LGPD、APPI等8个主要法域的法规要求进行交叉映射，建立统一的合规义务矩阵——识别出各类法域的'最大公约数'要求和'特殊性'要求。然后，设计三层递进式合规框架：（1）基线层——满足所有法域共同要求的全球统一标准（如数据最小化、目的限制、用户知情同意）；（2）区域层——针对特定法域的特殊要求设计的区域适配方案（如GDPR的充分性认定、CCPA的Opt-out机制）；（3）业务层——根据不同产品线的数据处理特征设计的差异化合规方案（如HR数据与用户行为数据的不同规则）。关键举措：建立全球统一的用户数据权限管理平台——用户可以在一个界面中管理自己在所有产品和法域中的数据权限；设立全球DPO和区域DPO的双层架构；为所有涉及用户数据的产品建立了DPIA审查流程。"
  result: "12个月内完成全球数据合规治理框架的搭建和部署。公司成为行业首家获得GDPR充分性认定的中国企业。数据合规风险评分从高危（3/10）降低至安全（8/10）。用户投诉量下降80%。此框架被多家中资出海企业借鉴。"
  transferable: "跨国数据合规的核心不是满足单一法域的最高标准，而是建立以'用户权利'为中心的全球统一的治理基线，再为各法域的特殊要求留出适配空间。"

- id: case_expert_123_3
  year: 2024
  title: "生成式AI大模型的伦理审计——以某开源LLM为例"
  problem: "某AI公司计划发布一个70B参数的开源大语言模型，但在发布前面临伦理审查的严峻挑战：模型在测试中表现出令人担忧的行为——在某些Prompt下输出有害内容（仇恨言论、暴力引导、虚假信息）、对特定群体表现出隐性偏见、且模型存在'越狱'安全漏洞（通过特定Prompt可以绕过安全对齐）。公司内部对是否按时发布存在重大分歧，产品团队主张'先发后改'的硅谷模式，法务团队主张'完全安全后再发'。"
  action: "采用AI伦理三原则评估矩阵对模型进行全面审计：（1）透明度评估——模型架构的透明度和训练数据的来源披露情况。发现训练数据中包含大量未经充分过滤的网络语料，部分数据源存在系统性偏见。（2）公平性评估——使用Red-Teaming方法对模型进行对抗性测试，设置了2000个测试用例覆盖性别、种族、宗教、地域、职业等15个敏感维度。发现模型在涉及'中东'和'宗教'的交叉话题上表现出的偏见最为严重。（3）问责性评估——评估模型的安全对齐（RLHF）效果和越狱防护。发现现有的安全护栏存在3类可被利用的越狱模式。基于审计结果，给出了分阶段发布的治理建议：第一阶段（1个月）——优先修复最高风险的越狱漏洞和高频有害输出，做防君子不防小人的基础安全加固；第二阶段（3个月）——系统性地改善模型在公平性维度上的表现，进行针对性的Red-Teaming和Fine-tuning；第三阶段（6个月）——建立开源模型的外部反馈和快速迭代机制。同时建议发布配套的使用准则、风险披露声明和开发者伦理使用协议。"
  result: "公司采纳了分阶段策略。第一阶段的加固版本按时发布，未出现重大安全事件。三个月后发布的v2版本在公平性测试中的偏见指标下降了67%，越狱成功率降低了90%。模型的开发者社区在伦理使用协议的约束下保持了良好的使用记录。此案例成为生成式AI模型负责任的发布范本，被多家AI安全组织引用。"
  transferable: "生成式AI的伦理治理不能追求'零风险'的不现实目标。务实的方法是将风险管理与业务节奏结合，在可接受的风险范围内分阶段推进。关键是风险必须被充分认知、披露且可控。"
