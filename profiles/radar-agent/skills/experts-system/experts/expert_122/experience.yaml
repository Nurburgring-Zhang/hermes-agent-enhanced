cases:
- id: case_expert_122_1
  year: 2021
  title: "华为某产品线——5000人规模的大规模敏捷转型"
  problem: "华为某核心产品线5000人团队采用传统的IPD（集成产品开发）流程，面临三个核心痛点：（1）市场需求变化太快，18个月的产品开发周期完全跟不上节奏；（2）多部门串行协作导致信息层层衰减，产品发布后经常发现与市场需求脱节；（3）员工长期在强流程管理下形成'等指令'的工作习惯，创新动力不足。前两次敏捷转型尝试均以失败告终，被员工戏称为'换了个名字的瀑布流'。"
  action: "采用变革阻力分级模型进行组织系统诊断，发现团队面临的主要阻力集中在第三级（关系阻力——部门墙导致Scrum团队跨职能协作困难）和第四级（文化阻力——'听领导安排'的惯性思维与自组织团队理念的根本冲突）。制定了分三步的变革路线图：第一阶段（3个月），在2个核心项目组试点Scrum，选择有变革意愿的团队而非最好的团队，在安全范围内创造早期胜利；第二阶段（6个月），将试点经验标准化后扩展至20个团队，同步建立内部敏捷教练培养计划，培养了50名内部教练；第三阶段（12个月），全产品线覆盖，将敏捷实践与IPD流程融合，设计出适应华为的'Huawei Agile'体系。关键举措：在每个阶段开始前，对各级管理层进行'变革领导力'培训——让管理者理解他们的角色从'任务分配者'变为'团队服务者'。"
  result: "18个月后，全产品线5000人实现敏捷转型。交付周期从平均18个月缩短至6周，缺陷率下降65%，员工满意度评分从3.2/5提升至4.5/5。'Huawei Agile'体系被华为内部评为最佳实践并在其他产品线推广。变革阻力分级模型在此过程中验证了其有效性——尤其是在识别和转化第三级和第四级阻力方面。"
  transferable: "大规模敏捷转型的核心挑战不是技术层面的框架选择，而是组织文化和权力结构的深层变革。变革阻力分级模型为系统化识别和化解阻力提供了可操作的工具框架。"

- id: case_expert_122_2
  year: 2023
  title: "平安科技——集团级敏捷转型的变革联盟构建实践"
  problem: "平安科技作为平安集团的技术子公司，4000人规模，承担集团所有金融科技产品的研发。问题在于：（1）集团各业务条线以'甲方'身份向科技公司提需求，形成'接单式开发'模式，IT与业务严重脱节；（2）每个项目都有独立的PMO管控流程，仅项目审批就需要5个层级，决策周期长达两周；（3）技术团队缺乏产品思维，只关注'需求做完了没有'而不关注'做的东西有没有用'。集团CTO希望引入敏捷但遭到各大业务线高管的强烈抵制。"
  action: "诊断后发现阻力主要是第二级（情感阻力——业务线高管担心失去对IT资源的控制权）和第一级（认知阻力——业务线不理解敏捷对他们有什么好处）。核心策略是构建变革联盟：首先与集团CTO和3位有变革意愿的业务线VP组成变革指导委员会（变革发起人）；然后在各业务线培养'敏捷对接人'（变革推动者），这些对接人既是业务线的代表也是敏捷的传播者。设计了一个双赢的试点方案：选择一条业务线，承诺在6个月内将其需求交付周期缩短50%（让业务线看到好处），同时保持该业务线对IT资源的优先调度权（消除控制权丧失的恐惧）。试点成功后，用数据说服其他业务线。同步对技术团队进行产品思维培训，从'做需求'转变为'解决问题'。"
  result: "12个月内，平安科技完成了从'接单式开发'到'产品化敏捷团队'的组织转型。试点业务线的需求交付周期从平均45天缩短至12天，业务满意度从62%提升至89%。其余6条业务线在数据面前主动要求加入敏捷转型。集团CTO评价：'这不是一次流程优化，是平安科技的一次基因重组。'"
  transferable: "变革的关键不在于方案多完美，而在于能否让关键利益相关者从'变革对象'转变为'变革伙伴'。消除情感阻力的最好方法不是说服，而是让他们亲身参与并获得收益。"

- id: case_expert_122_3
  year: 2019
  title: "西门子中国研究院——从层级文化到自组织文化的蜕变"
  problem: "西门子中国研究院（CT R China）300人团队，汇聚了各领域的顶尖工程师和科学家。问题在于：（1）研发团队习惯于'命令与控制'式的德国层级管理文化，每个决策都需要上升到部门经理，严重影响了创新效率；（2）研究院内部存在严重的'学科壁垒'——机械、软件、电子三个部门之间几乎没有协作，错失了大量跨学科创新机会；（3）员工普遍缺乏自主决策的习惯，即便是最小的工作安排也要等上级指示。研究院院长希望在保持技术深度的同时引入敏捷理念。"
  action: "诊断发现核心阻力在第四级（文化阻力）——'层级汇报'是团队默认的工作方式，甚至很多工程师认为'没有上级安排工作就等于没有工作'。阻力分级模型显示，直接推行Scrum团队自组织会引发强烈的文化冲突。于是设计了'渐进式自组织'路径：第一阶段（3个月），从'周报'改为'每日站会'——让团队成员习惯互相同步信息而非仅向经理汇报；第二阶段（3个月），引入'技术社区的Virtual Team'机制——在不改变正式组织架构的前提下，让工程师自主组建跨部门技术兴趣小组；第三阶段（6个月），将部分项目和预算授权给Virtual Team，让团队在'有限自主权'的环境中练习决策。同步对所有中层管理者进行'教练型领导力'培训，帮助他们从'监督者'转型为'赋能者'。"
  result: "12个月后，研究院形成了'双轨制'运行模式——正式层级架构负责日常运营管理，社区化自组织网络负责创新项目的孵化和执行。跨部门协作项目数量增长300%，专利申请量增长150%，员工的自主决策能力显著提升。一个工程师在回顾时说：'以前我是等指令的螺丝钉，现在我是自己项目的CEO。'此案例成为西门子全球研究院敏捷转型的标杆。"
  transferable: "在层级文化根深蒂固的组织中，直接推行自组织团队会引发文化休克。渐进式自主权授予——先让团队做'有限决策'——是化解第四级文化阻力的有效策略。关键是在不挑战既有权力的前提下为团队创造安全的自组织空间。"
