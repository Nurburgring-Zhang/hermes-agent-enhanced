cases:
- id: case_expert_124_1
  year: 2023
  title: "某消费电子巨头——亚太区供应链韧性重构"
  problem: "一家年营收2000亿的消费电子企业，在全球拥有5大制造基地和3000+供应商网络，2021-2022年连续遭受供应链重创：芯片短缺导致核心产品线停产3个月，海运价格暴涨5倍吞噬全部利润，某核心部件供应商工厂因疫情封控停产导致紧急切换供应商。公司意识到'低成本JIT供应链'在VUCA时代的脆弱性，但高管层对投入巨资建设供应链韧性存在分歧——CFO认为'多备库存是浪费'，COO认为'不备库存是赌博'。"
  action: "首先，运用供应链波动缓冲模型对所有关键物料进行风险画像，从四个维度评估：供应集中度（单一供应商占比>50%为高风险）、替代可行性（切换供应商的时间和认证成本）、需求波动率（月度需求变异系数）、前置时间（Lead Time）。识别出23项高风险的'瓶颈物料'。然后，针对不同风险等级设计差异化的缓冲策略：（1）对供应集中度高风险物料，建立'双源采购+安全库存'的双层缓冲——每个品类至少认证2家供应商，同时维持60天安全库存；（2）对需求波动率高风险物料，引入'延迟定制策略'——将通用半成品前置备货，最终定制环节延迟到接到订单后进行；（3）对芯片等战略性短缺物料，建立'预测共享+长期协议'的供应商协同机制——与核心供应商共享18个月的滚动预测，锁定产能配额。同时设计供应链控制塔（Supply Chain Control Tower）架构——集成ERP、WMS、TMS等系统数据，实现端到端的实时可视化和异常预警。"
  result: "18个月后，供应链韧性指标显著改善：瓶颈物料的供应中断次数从年均12次降至2次，平均恢复时间从14天缩短至3天。库存持有成本仅增加18%（远低于管理层担心的50%），而因供应中断造成的损失下降了76%。供应链控制塔上线后，异常事件的发现时间从平均4小时缩短至实时，决策响应时间从平均3天缩短至4小时。COO评价：'这不是在花钱，这是在买保险——而且这个保险的投资回报率是400%。'该模型被推广至公司的全球供应链体系。"
  transferable: "供应链韧性不是'备货多少'的问题，而是'知道哪里脆弱、用什么方式缓冲'的策略问题。供应链波动缓冲模型提供了一套系统化的风险识别和缓冲策略设计框架，适用于任何制造型企业的供应链韧性评估和改造。"

- id: case_expert_124_2
  year: 2021
  title: "某新能源汽车品牌——从0到月产3万辆的供应链体系建设"
  problem: "一家新势力造车企业在完成产品定义和融资后面临严峻的供应链挑战：从零开始建设供应链体系，要在18个月内达到月产3万辆的产能。当时全球汽车芯片短缺加剧，动力电池供不应求，传统车企早已锁定核心供应商产能。作为一个新品牌，供应商合作意愿低、议价能力弱。同时，公司自身对供应链管理缺乏经验——采购团队只有5个人，且创始人坚持'自研核心部件'的策略进一步加大了供应链复杂度。"
  action: "第一步，进行供应链战略定位——基于竞争战略确定'哪些自研、哪些外采、哪些合作'：三电系统（电池、电机、电控）自研以建立技术壁垒，通用部件（轮胎、玻璃、座椅）采用竞争性招标降低成本，核心芯片和电池通过'深度合作+股权投资'锁定长期产能。第二步，设计供应商准入和分级管理体系——将供应商分为战略型（长期绑定）、伙伴型（3年合约）、交易型（年度竞价）三类，针对不同类型的供应商采用差异化的合作策略。第三步，引入精益供应链理念——在总装工厂周边建立'供应商园区'，核心供应商驻场生产，实现JIT供货；同时建立3级库存缓冲体系（产线边缓冲-工厂内缓冲-区域配送中心缓冲），应对供应链中断风险。第四步，运用精益六西格玛方法对采购到交付的全流程进行优化，识别并消除7类浪费（过量生产、等待、运输、过度加工、库存、动作、缺陷）。"
  result: "15个月后达到月产3万辆的目标——比计划提前3个月。供应链总成本比行业平均水平低12%（得益于精益设计和供应商园区的协同效应）。核心部件的供应保障率达到99.2%（行业平均95%）。通过供应商分级管理，战略型供应商的交付准时率从初期的67%提升至96%。公司被评为'年度供应链创新企业'。这套从0到1的供应链体系构建方法论后被多家新势力车企借鉴。"
  transferable: "从零开始建设供应链的核心是'战略先于执行'——先明确哪些能力必须内建、哪些可以外包，再基于这个战略选择设计供应商体系和运营模式。精益六西格玛在供应链中的应用重点不是'消除库存'而是'消除不确定性'。"

- id: case_expert_124_3
  year: 2024
  title: "某快消巨头——全球供应链数字化转型与智能预测体系"
  problem: "一家年营收500亿的快消品企业，产品覆盖100+国家，拥有50+工厂和200+分销中心。供应链面临三大痛点：（1）需求预测准确率仅52%，导致每年因缺货损失约8亿营收，同时因过剩库存浪费约5亿仓储成本；（2）供应链各环节数据孤岛严重——从销售预测、采购计划、生产排程到物流配送，每个环节使用独立的Excel表格和邮件沟通，计划周期长达2周；（3）缺乏对供应链全局的实时可视化，管理层在决策时只能依赖滞后2-3周的报表数据。"
  action: "主导了从'反应式供应链'到'预测型供应链'的数字化转型。首先，建立统一的数据中台——整合POS销售数据、经销商库存数据、工厂生产数据、物流追踪数据等18个数据源，清洗标准化后建立统一的供应链数据模型。然后，基于时序分析（ARIMA+Prophet）和机器学习（XGBoost+图神经网络）构建分层预测体系：品类层（中长期趋势预测）→SKU层（中短期需求预测）→门店层（短期补货预测）。预测模型不仅考虑了历史销售数据，还融入了天气、节假日、促销活动、宏观经济指数等外部特征。在物流环节，引入动态路由优化算法——根据实时交通、订单密度、配送时效等约束条件，每天自动优化配送路线，将车辆利用率提升了30%。在生产环节，建立'需求驱动的动态排产系统'——根据最新的销售预测和库存状态，自动调整各工厂的生产优先级和排产计划，将排产周期从两周缩短至每天动态调整。"
  result: "12个月完成端到端的供应链数字化改造。需求预测准确率从52%提升至81%（高波动品类）和94%（稳定品类）。缺货损失从8亿降至2.5亿，过剩库存成本从5亿降至1.8亿。物流配送效率提升30%，碳排放降低15%。排产周期从2周缩短至每天动态调整。供应链的整体运营效率提升了40%。CEO评价：'这套系统让我们从'看后视镜开车'变成了'看导航开车'。'该项目获得了2024年度供应链数字化转型金奖。"
  transferable: "供应链数字化转型的核心不是上系统，而是构建'数据+算法+流程'三位一体的决策体系。预测能力的提升不仅减少了库存成本，更重要的是让整个供应链从被动响应转为主动规划。这套方法论适用于任何面临需求波动和供应链复杂性的企业。"
