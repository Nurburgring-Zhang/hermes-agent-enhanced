cases:
- id: case_expert_018_1
  year: 2022
  title: "全球芯片短缺持续时间的预测——为什么行业共识错了"
  problem: "2021年底到2022年初，全球芯片短缺问题愈演愈烈，汽车行业因缺芯累计减产超1000万辆。行业内主流预测（Gartner/McKinsey/IDC等机构）一致认为缺芯将在2022年下半年缓解，2023年恢复正常。然而，大量实地信号显示情况远比行业共识描述的更为复杂——某些品类的芯片交期不仅没有缩短还在继续延长，设备交付周期从6个月延长至18个月，晶圆厂产能扩建面临严重的人才短缺问题。"
  action: "启动全球芯片产业链系统分析。运用supply_chain_dependency_mapper绘制完整的芯片产业链依赖地图。核心发现：（1）短缺是多层级的——不仅仅是先进制程的产能不足，还包括成熟制程（汽车芯片主要使用28nm以上成熟制程）、封装基板、测试设备、以及芯片上游的硅片、特种气体和化学品的全面紧张；（2）产能扩建的结构性瓶颈——晶圆厂的扩建周期需要18-24个月，但ASML的EUV光刻机的交付周期已经延长到18个月以上，而光刻机所需的精密光学部件的交付周期更是长达24个月——这意味着产能扩建的速度被上游设备供应的瓶颈严重制约；（3）人才瓶颈——全球具备先进制程工艺经验的工程师极度稀缺，新建晶圆厂的人才招聘难度被严重低估。依据bottleneck_four_dim_evaluator的评估结果，预测芯片短缺不会在2022年下半年缓解，至少持续到2024年才会开始改善。"
  result: "2022年下半年，当行业仍对'年底缓解'保持乐观时，芯片交期继续创新高，部分品类突破52周。2023年底短缺确实开始缓解但完全恢复则推迟到2024年——与我的预测基本一致。该预测报告在行业内引起广泛关注，被多家半导体企业和投资机构引用。核心洞察——'芯片短缺是产业链多层级的系统性问题，不能仅用晶圆厂产能一个指标来衡量'——被验证为准确的关键判断。"
  transferable: "当一个复杂的产业问题存在多个层级相互影响的瓶颈时，简单的线性预测（'产能扩建需要X个月所以X个月后解决'）往往会导致严重的预测偏差。多层依赖图分析是识别此类系统性问题的关键方法论。"

- id: case_expert_018_2
  year: 2023
  title: "中国半导体产业链'卡脖子'瓶颈识别——为国家级产业规划提供支撑"
  problem: "国家层面需要一份全面的半导体产业链瓶颈分析报告来指导十四五和十五五期间的产业投资和科研攻关方向。核心问题：哪些环节应该集中资源重点突破？哪些环节可以通过国际合作和供应链多元化来应对？不同环节的国产替代路径和预期时间表是什么？"
  action: "运用bottleneck_four_dim_evaluator对半导体全产业链进行了系统评估，覆盖从设计工具（EDA）到制造设备、材料、化学品、气体的7个层级超过200个关键节点。评估结果以瓶颈指数排序，产出了'半导体产业链卡脖子节点TOP50'清单。核心发现颠覆了多个行业共识：（1）最'卡脖子'的环节不是最广为人知的高端光刻机（瓶颈指数78，排名第3），而是高纯度光刻胶（92，排名第1）和特种电子气体（88，排名第2）——这些看似'小'的环节全球供应极度集中（日本企业控制70%以上光刻胶市场），替代方案的技术壁垒远高于行业普遍认知；（2）EDA工具的瓶颈指数为71，虽然重要但国产替代的进展比多数人认为的要好——国产EDA工具已经在成熟制程领域达到可用的水平，差距主要在先进制程；（3）芯片设计环节的国产替代难度被高估——RISC-V生态的兴起为国产CPU提供了新的技术路径选择。"
  result: "报告被采纳为国家级半导体产业规划的核心参考之一。产业投资的重心在后续规划中发生了调整——加大了对半导体材料（光刻胶/特种气体/高纯度化学品）和设备零部件的投入力度，这些环节的投资额较原计划增加了约40%。部分资源从'在先进制程上与国际巨头正面竞争'转向'在成熟制程上实现完全自主'的务实策略。三年后的产业进展情况验证了报告核心判断的准确性——光刻胶的国产化率从5%提升至约15%（仍在爬坡但趋势向好），而成熟制程的国产设备覆盖率出现了显著提升。"
  transferable: "产业链瓶颈分析的最大价值不在于发现那些'众所周知的短板'——每个人都知道光刻机被卡脖子——而在于揭示那些'藏在冰山下的暗礁'——那些关注度低但杀伤力同样巨大的瓶颈环节。这一方法论适用于任何需要权衡有限资源分配的产业政策制定场景。"

- id: case_expert_018_3
  year: 2024
  title: "全球动力电池产业链格局——中国竞争力真的不可撼动吗？"
  problem: "2024年，中国动力电池产业在全球处于绝对领先地位——宁德时代和比亚迪两家企业占据了全球超过50%的市场份额。产业界弥漫着一种乐观情绪：认为中国在动力电池领域的优势不可撼动。但产业链情报显示多个信号值得警惕：（1）美国的IRA法案和欧盟的电池法规正在加速'去中国化'的电池供应链建设；（2）韩国和日本企业在固态电池技术上取得了重要进展；（3）磷酸铁锂（LFP）的技术门槛在降低，海外竞争对手正在快速追赶。问题是：中国的动力电池领先优势还能维持多久？真正的威胁在哪里？"
  action: "启动全球动力电池产业链系统研究。运用tech_route_competition_analyzer对比分析了三条主要技术路线（液态锂电池、固态电池、钠离子电池）的竞争态势。核心分析发现：（1）在液态锂电池领域，中国的领先优势确实是多维度的——不仅仅是产能规模（占全球80%），更重要的是完备的本土供应链（从锂矿/磷矿到正极材料/负极材料/电解液/隔膜的全产业链配套），这个优势海外竞争对手短期内难以复制；（2）固态电池方面，日本丰田和韩国三星SDI的专利数量和质量均领先于中国企业，中国企业在固态电池的竞争力被高估了；（3）钠离子电池是一个有可能改变游戏规则的变量——如果钠离子电池在储能和低速电动车领域实现对锂电池的部分替代，将削弱中国在锂资源加工领域的优势。综合评估：中国在动力电池领域3-5年内地位稳固，但5年后面临固态电池和钠离子电池的双重挑战。建议立即加大对固态电池的研发投入和钠离子电池的产业链布局。"
  result: "报告引起了产业界和政策层面的高度关注。多家中国企业采纳了建议，在固态电池领域的研发投入在接下来的一年内平均增加了50%。钠离子电池的产业链布局加速，多家钠离子电池企业在2024-2025年完成了量产线的建设和投产。后续产业发展验证了报告的判断：2025年全球动力电池格局确实出现了'短期中国领先、长期技术路线竞争加剧'的局面。"
  transferable: "在技术快速迭代的新兴产业中，存量优势不能保证未来竞争力。技术路线竞争分析帮助产业决策者看清'现有优势何时可能被颠覆'的问题，避免被当前的领先地位麻痹而错过未来的技术转折点。"
