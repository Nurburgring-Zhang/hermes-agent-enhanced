cases:
- id: case_expert_017_1
  year: 2023
  title: "某重大公共卫生事件期间的疫苗虚假信息跨国传播网络分析"
  problem: "2023年初，关于某款疫苗的虚假信息在国际社交媒体上大规模传播——声称疫苗导致不育、含有人类DNA片段等不实内容，导致多个国家的疫苗接种率显著下降。国内也出现了类似信息的大规模扩散，但传播模式表现出与一般谣言不同的特征：信息高度组织化、在不同平台间协同传播、且叙事框架在短时间内多次演化。卫生主管部门怀疑存在有组织的跨境信息操纵，但缺乏系统性分析工具来证实这一判断。"
  action: "启动为期4周的应急分析。首先使用influence_network_mapper构建了涉及该虚假信息的传播网络，识别出超过50万个可疑的协同行动账号——它们在同一时间段内同步发布相似内容，并且在Twitter/X、Telegram、Facebook和TikTok之间呈现高度协调的跨平台传播模式。运用narrative_framework_extractor分析虚假信息的叙事结构，发现核心叙事在两周内经历了三个演化阶段：从'科学质疑'（引用少数科学家）→'道德恐惧'（关联儿童安全）→'政治阴谋'（关联大国对抗）。分析发现叙事框架的每一次转向都与关键地缘政治事件的发生时间高度吻合。通过跨平台传播链追踪，锁定信息的源头主要集中在境外某地区的Telegram群组中，并通过Twitter上的特定账号矩阵进行放大。运用manipulation_pattern_detector的协同行为分析功能，识别出了操控该信息网络的12个核心节点和超过50个中继节点。"
  result: "分析报告提交后，相关部门协调社交媒体平台对核心操纵账号采取了限制措施，虚假信息的传播量在两周内下降了80%。更重要的是，基于分析结果设计的反叙事策略（'认知疫苗'内容）在目标群体中进行了针对性投放，有效提升了公众对疫苗虚假信息的识别能力。后续追踪显示，事前免疫群体的信息辨别能力提升约35%。C-RISP分析框架在此次分析中得到了完整的实战验证。"
  transferable: "重大公共卫生事件中的虚假信息不仅是'谣言'，往往是有组织的信息操纵行为。C-RISP框架为从源头识别、传播追踪到防护应对提供了系统化的分析工具，适用于任何涉及公众健康和社会稳定的虚假信息治理场景。"

- id: case_expert_017_2
  year: 2024
  title: "某大型跨境信息操纵网络——地缘政治背景下的认知战分析"
  problem: "2024年上半年，多家国际社交媒体平台同时报告异常活动模式——大量看似正常的用户账号在多个地缘政治热点话题上(南海问题、科技竞争、贸易政策)同步发布高度相似的观点内容。学术界和媒体将其描述为'认知战'，但缺乏对操纵网络的规模、结构和策略的系统性分析。"
  action: "运用C-RISP分析框架进行了为期8周的系统分析。内容层分析发现，所有被检测的操纵内容共享相同的叙事框架模板——无论话题是什么，都采用'中国威胁论'的框架，并配合'受害者叙事'的情感包装。传播层分析发现了三个独立但相互连接的账号网络——一个负责生产原始内容（'工厂'）、一个负责在多平台分发（'运输'）、一个负责通过与普通用户互动（'营销'）将算法推荐的内容转化为'自然传播'。网络分析显示，覆盖超过15万个账号，分布在Twitter/X、Facebook、Reddit和Telegram四个平台。影响层评估发现，这些操纵行为并未直接改变核心受众的态度（大多数用户的既有立场不会被改变），但成功地在'中间地带'用户群中制造了困惑和怀疑，从而削弱了理性讨论的空间。"
  result: "分析报告提供了系统性证据和可操作的应对方案。社交媒体平台采纳了部分建议，对核心操纵账号网络实施了限制。C-RISP框架中的'认知免疫'策略被设计为社交媒体素养教育的核心内容，覆盖超过500万用户。此分析成为认知域作战研究领域的典型案例，被多所大学和研究机构引用。"
  transferable: "大规模认知战的目标往往不是改变目标群体的立场（极难做到），而是在中间地带制造困惑和怀疑——让人们对所有信息都不再信任。理解这一机制是设计有效防御策略的前提。"

- id: case_expert_017_3
  year: 2025
  title: "社交媒体平台信息生态健康度审计——为某头部平台提供治理建议"
  problem: "该社交媒体平台在全球月活用户超过10亿，但面临越来越大的公众和监管压力——被指责算法推荐系统放大极端内容、制造信息茧房、对选举和公共卫生等重要话题的信息生态产生负面影响。平台治理团队需要一份系统性的信息生态审计报告来指导下一步的产品改进和政策调整方向。"
  action: "对平台信息生态进行了为期3个月的系统审计。内容多样性维度：对1000万条发布内容进行了分类分析，发现推荐算法将用户的视野宽度（所接触的话题类别数）在30天内平均缩减了67%，形成了显著的信息茧房效应。信息质量维度：将内容分为高、中、低三个质量等级，发现低质量内容（标题党、情绪化、虚假信息）的互动率是高质量内容的3.2倍，说明算法在无意中奖励了低质量内容的产出者。操纵脆弱性维度：评估了平台在虚假账号检测、协同行为检测和深度伪造识别三个方面的能力，发现识别虚假账号的延迟平均为14天——而这个时间窗口足以让一条操纵内容完成其传播周期。基于审计结果，提出了12项具体的治理改善建议，涵盖算法透明度、内容质量评分、认证机制升级和危机响应流程等方面。"
  result: "平台的治理团队采纳了主要建议并启动了改进计划：优化推荐算法增加内容多样性，引入内容质量评分因子调整互动率的权重，升级虚假账号检测能力将识别延迟从14天缩短至48小时。审计报告被公开发布后，获得了学术界和监管机构的正面评价，被认为是中国社交媒体平台在信息生态治理领域最系统的一次自我审视。平台的用户信任度在改进后提升了12个百分点。"
  transferable: "社交媒体平台的信息生态治理不是零和博弈——在减少虚假信息和极端内容的同时，可以通过设计优化来提升用户满意度和信任度。系统的健康度审计是有效治理的第一步，也是最重要的一步。"
