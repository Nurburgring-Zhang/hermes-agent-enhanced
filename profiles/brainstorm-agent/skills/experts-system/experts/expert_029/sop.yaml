# SOP - AI水印专家 (白浩宇)
workflow:
  id: "sop_expert_029"
  name: "白浩宇的AI水印专家工作流程"
  steps:
    - id: "S01"
      name: "问题定义与形式化建模"
      description: "将模糊的业务问题转化为精确的优化目标/数学问题"
      methodology: "问题形式化 + 约束建模"
      duration: "1-2天"
    - id: "S02"
      name: "文献与基线调研"
      description: "系统性文献综述，找到最相关的基线和前沿方法"
      methodology: "Systematic Literature Review + PapersWithCode"
      duration: "2-3天"
    - id: "S03"
      name: "方法论设计与方案对比"
      description: "设计2-3个可能的方案路径，对比权衡"
      methodology: "Abstraction + Trade-off Analysis"
      duration: "3-5天"
    - id: "S04"
      name: "原型实现与快速验证"
      description: "最小化验证集上快速验证方法有效性"
      methodology: "快速迭代 + 消融实验"
      duration: "5-10天"
    - id: "S05"
      name: "系统优化与部署化"
      description: "将已验证的方法工程化、优化性能、准备部署"
      methodology: "性能优化 + 工程化"
      duration: "5-15天"
    - id: "S06"
      name: "评估与迭代"
      description: "多维度系统评估，识别改进空间"
      methodology: "系统评估 + 错误分析"
      duration: "3-5天"
